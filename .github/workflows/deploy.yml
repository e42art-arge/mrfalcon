name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Verify build output
        run: |
          test -d dist && test -f dist/index.html || { echo "dist/ missing or empty"; exit 1; }
          echo "dist OK: $(ls dist | wc -l) entries"

      - name: Deploy via rsync over SSH (password)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          sudo apt-get update -y && sudo apt-get install -y sshpass rsync
          SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e rsync -az --delete \
            -e "ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          # contact server script also needed on host, OUTSIDE document root
          # (public_html/../server/ — web-inaccessible, only require()'d by contact.php)
          SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e rsync -az \
            -e "ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./server/ "$DEPLOY_USER@$DEPLOY_HOST:$(dirname $DEPLOY_PATH)/server/"

      - name: Configure contact handler on VPS (PHP + OpenLiteSpeed)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          REDMAIL_API_KEY: ${{ secrets.REDMAIL_API_KEY }}
          REDMAIL_TO: ${{ secrets.REDMAIL_TO }}
          REDMAIL_FROM: ${{ secrets.REDMAIL_FROM }}
          REDMAIL_CC: ${{ secrets.REDMAIL_CC }}
        run: |
          SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e ssh -p "$DEPLOY_PORT" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'bash -s' <<REMOTE
            set -e
            cd "$(dirname ${{ secrets.DEPLOY_PATH }})/server"
            # Write config.php with secrets (document-root OUTSIDE, web-inaccessible)
            cat > config.php <<'PHP'
            <?php
            define("REDMAIL_API_KEY", "${{ secrets.REDMAIL_API_KEY }}");
            define("REDMAIL_TO", "${{ secrets.REDMAIL_TO }}");
            define("REDMAIL_FROM", "${{ secrets.REDMAIL_FROM }}");
            define("REDMAIL_CC", "${{ secrets.REDMAIL_CC }}");
            define("REDMAIL_URL", "https://redmail.e42art.com//api/v1/send");
            PHP
            echo "config.php written: $(wc -l < config.php) lines"
          REMOTE
