name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Verify build output
        run: |
          test -d dist && test -f dist/index.html || { echo "dist/ missing or empty"; exit 1; }
          echo "dist OK: $(ls dist | wc -l) entries"

      - name: Deploy via rsync over SSH (password)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          sudo apt-get update -y && sudo apt-get install -y sshpass rsync
          SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e rsync -az --delete \
            -e "ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          # contact server script also needed on host
          SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e rsync -az \
            -e "ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./server/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/../server/"

      - name: Restart contact server on VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          REDMAIL_API_KEY: ${{ secrets.REDMAIL_API_KEY }}
          REDMAIL_TO: ${{ secrets.REDMAIL_TO }}
          REDMAIL_FROM: ${{ secrets.REDMAIL_FROM }}
        run: |
          SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e ssh -p "$DEPLOY_PORT" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'bash -s' <<'REMOTE'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # ensure contact server runs (pm2 if available, else nohup)
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart contact 2>/dev/null || \
              REDMAIL_API_KEY="${{ secrets.REDMAIL_API_KEY }}" \
              REDMAIL_TO="${{ secrets.REDMAIL_TO }}" \
              REDMAIL_FROM="${{ secrets.REDMAIL_FROM }}" \
              pm2 start server/contact.mjs --name contact
            else
              pkill -f "server/contact.mjs" || true
              REDMAIL_API_KEY="${{ secrets.REDMAIL_API_KEY }}" \
              REDMAIL_TO="${{ secrets.REDMAIL_TO }}" \
              REDMAIL_FROM="${{ secrets.REDMAIL_FROM }}" \
              nohup node server/contact.mjs > /tmp/contact.log 2>&1 &
            fi
          REMOTE
